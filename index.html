<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CALCULADORA DE INSPEÇÃO</title>
<style>
  * { box-sizing: border-box; }
  
  body {
    font-family: system-ui, -apple-system, sans-serif;
    margin: 0;
    background-color: #f8f9fa;
    color: #333;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 1vh 2vw;
  }
  
  h1 { font-size: 1.6rem; text-align: center; margin: 8px 0; color: #1a1a1a; }
  
  .main-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 1000px;
    margin: 0 auto;
    width: 100%;
    min-height: 0;
  }

  .top-row { display: flex; gap: 15px; flex: 2; }

  .card {
    flex: 1;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.07);
    padding: 15px;
    display: flex;
    flex-direction: column;
    border: 1px solid #e9ecef;
  }

  h3 {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 0 0 12px 0;
    font-size: 1.1rem;
    padding-bottom: 8px;
    border-bottom: 2px solid #f1f3f5;
  }

  .field-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  label { font-size: 0.85rem; font-weight: 600; color: #495057; }
  input { width: 90px; padding: 6px; border-radius: 6px; border: 1px solid #ced4da; font-size: 0.95rem; text-align: center; }
  
  /* Estrutura dos Resultados */
  .out-container { margin-top: auto; display: flex; flex-direction: column; gap: 8px; }
  
  /* Box do Total (Maior Destaque) */
  .out-box-total {
    background: #e7f1ff;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
    border: 1px solid #b3d7ff;
  }
  .out-box-total .out-label { color: #0056b3; font-weight: 700; }
  .out-box-total .out-value { color: #0056b3; font-size: 2.2rem; }

  /* Box Por Código/Volume */
  .out-box {
    background: #f1f3f5;
    padding: 8px;
    border-radius: 8px;
    text-align: center;
    border: 1px solid #dee2e6;
  }
  
  .out-label { font-size: 0.7rem; color: #6c757d; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; font-weight: 600; }
  .out-value { font-size: 1.6rem; font-weight: 800; color: #495057; }

  .suplementos-card { flex: 1.1; padding: 12px 20px; }
  
  .info-box {
    background-color: #fff9db;
    border: 1px solid #ffec99;
    padding: 10px;
    border-radius: 8px;
    font-size: 0.85rem;
    display: flex;
    justify-content: space-around;
    align-items: center;
    margin-bottom: 10px;
  }

  .result-box {
    margin-top: 8px;
    padding: 10px;
    border-radius: 8px;
    display: none;
    font-weight: bold;
    text-align: center;
    font-size: 1rem;
  }
  
  .status-green { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
  .status-orange { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
  .status-red { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
  
  footer { padding: 5px 0; font-size: 0.75rem; color: #adb5bd; display: flex; justify-content: space-between; align-items: center; }
  .logo-rodape { height: 18px; opacity: 0.3; }
</style>
</head>
<body>

  <h1>CALCULADORA DE INSPEÇÃO</h1>

  <div class="main-container">
    <div class="top-row">
      <div class="card">
        <h3>👕 VESTUÁRIOS</h3>
        <div class="field-group">
          <label>Peças na NF</label>
          <input id="v_nf" type="number" placeholder="0">
        </div>
        <div class="field-group">
          <label>Total de Códigos</label>
          <input id="v_codes" type="number" placeholder="0">
        </div>
        <div class="field-group">
          <label>Amostragem %</label>
          <input id="v_pct" type="number" value="30">
        </div>

        <div class="out-container">
          <div class="out-box-total">
            <div class="out-label">Total a Inspecionar</div>
            <div id="v_total" class="out-value">0</div>
          </div>
          <div class="out-box">
            <div class="out-label">Por Código</div>
            <div id="v_per" class="out-value">0</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>👟 CALÇADOS</h3>
        <div class="field-group">
          <label>Peças na NF</label>
          <input id="c_nf" type="number" placeholder="0">
        </div>
        <div class="field-group">
          <label>Total de Volumes</label>
          <input id="c_volumes" type="number" placeholder="0">
        </div>
        <div class="field-group">
          <label>Amostragem %</label>
          <input id="c_pct" type="number" value="30">
        </div>

        <div class="out-container">
          <div class="out-box-total">
            <div class="out-label">Total a Inspecionar</div>
            <div id="c_total" class="out-value">0</div>
          </div>
          <div class="out-box">
            <div class="out-label">Por Volume</div>
            <div id="c_per" class="out-value">0</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card suplementos-card">
      <h3>💊 SUPLEMENTOS</h3>
      <div class="info-box">
        <div><strong>Hoje:</strong> <span id="s_hoje"></span></div>
        <div><strong>Data Limite:</strong> <span id="s_limite" style="color: #d63031; font-weight: 800;"></span></div>
        <div style="color: #c62828; font-weight: bold;">⚠️ Validade ANTERIOR ao limite = REPROVADA</div>
      </div>

      <div class="field-group" style="justify-content: center; gap: 30px;">
        <label>Validade do Produto:</label>
        <input id="s_data_input" type="date" style="width: 150px;">
      </div>

      <div id="s_resultado" class="result-box"></div>
    </div>

    <footer>
      <span>© 2026 Futfanatics - Controle de Qualidade</span>
      <img src="Futfantatics.jpg" alt="" class="logo-rodape">
    </footer>
  </div>

<script>
function formatLocal(date) {
  const d = String(date.getDate()).padStart(2, '0');
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const y = date.getFullYear();
  return `${d}/${m}/${y}`;
}

function getDiffText(today, prodDate) {
  let y = prodDate.getFullYear() - today.getFullYear();
  let m = prodDate.getMonth() - today.getMonth();
  let d = prodDate.getDate() - today.getDate();
  if (d < 0) { 
    m--; 
    const lastDayPrevMonth = new Date(prodDate.getFullYear(), prodDate.getMonth(), 0).getDate();
    d += lastDayPrevMonth; 
  }
  if (m < 0) { y--; m += 12; }
  let res = [];
  if (y > 0) res.push(`${y} ano${y>1?'s':''}`);
  if (m > 0) res.push(`${m} mê${m>1?'ses':'s'}`);
  if (d > 0) res.push(`${d} dia${d>1?'s':''}`);
  return res.join(' e ') || "0 dias";
}

function calcSection(nfId, partsId, pctId, totalId, perId){
  const nf = Number(document.getElementById(nfId).value) || 0;
  const parts = Number(document.getElementById(partsId).value) || 0;
  let pctInput = Number(document.getElementById(pctId).value) || 0;
  let pct = pctInput > 1 ? pctInput / 100 : pctInput;

  const totalTeorico = nf * pct;
  const perBase = parts > 0 ? Math.ceil(totalTeorico / parts) : 0;
  const totalReal = perBase * parts;

  document.getElementById(totalId).innerText = totalReal;
  document.getElementById(perId).innerText = perBase;
}

function calcSuplementos() {
  const today = new Date();
  today.setHours(0,0,0,0); 
  const limitDate = new Date(today);
  limitDate.setMonth(limitDate.getMonth() + 8);
  const warningDate = new Date(limitDate);
  warningDate.setDate(warningDate.getDate() + 15);

  document.getElementById('s_hoje').innerText = formatLocal(today);
  document.getElementById('s_limite').innerText = formatLocal(limitDate);

  const inputVal = document.getElementById('s_data_input').value;
  const resDiv = document.getElementById('s_resultado');

  if (!inputVal) { resDiv.style.display = 'none'; return; }

  const [iy, im, id] = inputVal.split('-');
  const prodDate = new Date(iy, im - 1, id);
  prodDate.setHours(0,0,0,0);

  resDiv.style.display = 'block';
  const diffText = getDiffText(today, prodDate);

  if (prodDate < today) {
    resDiv.className = 'result-box status-red';
    resDiv.innerHTML = `❌ PRODUTO JÁ VENCIDO`;
  } else if (prodDate < limitDate) {
    resDiv.className = 'result-box status-red';
    resDiv.innerHTML = `🔴 REPROVADO (Vida útil: ${diffText})`;
  } else if (prodDate >= limitDate && prodDate <= warningDate) {
    resDiv.className = 'result-box status-orange';
    resDiv.innerHTML = `🟠 PARE! CONTATE O COMERCIAL (Vida útil: ${diffText})`;
  } else {
    resDiv.className = 'result-box status-green';
    resDiv.innerHTML = `🟢 APROVADO (Vida útil: ${diffText})`;
  }
}

function calcAll(){
  calcSection('v_nf','v_codes','v_pct','v_total','v_per');
  calcSection('c_nf','c_volumes','c_pct','c_total','c_per');
  calcSuplementos();
}

document.querySelectorAll('input').forEach(el => el.addEventListener('input', calcAll));
window.addEventListener('load', calcAll);
</script>

</body>
</html>
